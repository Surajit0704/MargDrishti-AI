<style>
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .bg-cinematic {
            /* Prioritizes a local Flask static asset, falls back to the external image, and has a dark fallback */
            background-color: #090f11;
            background-image: url("{{ url_for('static', filename='backgrounds/loading_bg.jpg') }}"), url('https://lh3.googleusercontent.com/aida-public/AB6AXuBkJX0s_U3IXDUblz0cU3GuN9_VAvh4_yXTwaMlu-km11o59G14rXlbVcDeCV9oZHemcdb_TgBcHtnKqUbLDOw04KCtCXlm77jHwwyCcU35RTNNYtW3HjtxTYiVDF_kxnNzuFb1tZ_03YpmgqiM4DZoFPwOyoSWRsdlIqE1FSzTi7n30qhOVXMUk4Du-pi1vUAljG7WjFv442tpgm1smFSsFkYJ1zLXk_mmKDo8W8H0Y78QByOp0AE1ZyliyDaOxWPqGxIZtQgkQ2c');
            background-size: cover;
            background-position: center;
        }

        /* Traffic Light Sequence */
        @keyframes seq-red {
            0%, 25% { opacity: 1; box-shadow: 0 0 30px #ff3b3b, inset 0 0 10px #ff3b3b; }
            30%, 100% { opacity: 0.1; box-shadow: none; }
        }
        @keyframes seq-yellow {
            0%, 25% { opacity: 0.1; box-shadow: none; }
            30%, 55% { opacity: 1; box-shadow: 0 0 30px #ffff00, inset 0 0 10px #ffff00; }
            60%, 100% { opacity: 0.1; box-shadow: none; }
        }
        @keyframes seq-green {
            0%, 55% { opacity: 0.1; box-shadow: none; }
            60%, 95% { opacity: 1; box-shadow: 0 0 30px #22c55e, inset 0 0 10px #22c55e; }
            100% { opacity: 0.1; box-shadow: none; }
        }
        
        .light-red { animation: seq-red 4s infinite; background-color: #ff3b3b; }
        .light-yellow { animation: seq-yellow 4s infinite; background-color: #ffff00; }
        .light-green { animation: seq-green 4s infinite; background-color: #22c55e; }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(14, 20, 22, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* 3D Housing */
        .traffic-housing {
            background: linear-gradient(145deg, #1f2527, #151d1f);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5), 
                       -5px -5px 15px rgba(255,255,255,0.05),
                       inset 0 0 0 1px rgba(255,255,255,0.1);
        }

        /* Dynamic Text */
        .dynamic-text::after {
            content: "Connecting AI Cameras...";
            animation: text-cycle 8s infinite;
        }

        /* Particles & Streaks */
        @keyframes particle-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #4cd7f6;
            border-radius: 50%;
            box-shadow: 0 0 10px #4cd7f6;
        }
        .particle:nth-child(1) { left: 10%; animation: particle-up 4s infinite 0.2s; }
        .particle:nth-child(2) { left: 30%; animation: particle-up 6s infinite 1.5s; }
        .particle:nth-child(3) { left: 50%; animation: particle-up 5s infinite 0.8s; }
        .particle:nth-child(4) { left: 70%; animation: particle-up 7s infinite 2.1s; }
        .particle:nth-child(5) { left: 90%; animation: particle-up 4.5s infinite 0.5s; }

        .light-streak {
            position: absolute;
            width: 2px;
            height: 150px;
            background: linear-gradient(to bottom, transparent, #4cd7f6, transparent);
            opacity: 0.3;
        }
        @keyframes streak-fall {
            0% { transform: translateY(-150px); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
        .light-streak:nth-child(6) { left: 20%; animation: streak-fall 3s infinite 0s; }
        .light-streak:nth-child(7) { left: 80%; animation: streak-fall 4s infinite 1.2s; }
        
        /* Transition Container */
        .boot-sequence {
            animation: fade-out 0.8s ease-in forwards 4.8s; /* Smoother, slightly earlier fade */
        }
    </style>
</head>

<!-- Redirect Handling Script -->
<script>
    document.addEventListener("DOMContentLoaded", () => {
        // The progress bar takes 5s. Fade out starts at 4.8s and ends at 5.6s.
        // Redirect precisely when the screen is dark (around 5.5s) for a seamless transition.
        setTimeout(() => {
            // Ensure background is solid dark before navigation to avoid flashes
            document.body.style.backgroundColor = "#090f11";
            document.body.style.backgroundImage = "none";
            document.body.innerHTML = ""; 
            
            // Redirect using Flask routing
            window.location.replace("{{ url_for('dashboard') }}");
        }, 5500); 
    });
</script>
