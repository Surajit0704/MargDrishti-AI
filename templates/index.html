<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Traffic AI Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

  <h1 class="title">🚦 Smart Traffic AI System</h1>

  <!-- UPLOAD -->
  <div class="card">
    <h2>Upload Lane Images</h2>
    <div class="upload-row">
      <input type="file" id="lane1" accept="image/*">
      <input type="file" id="lane2" accept="image/*">
      <input type="file" id="lane3" accept="image/*">
      <button type="button" onclick="sendImages()">Start</button>
    </div>
  </div>

  <!-- LANES -->
  <div class="lane-grid">

    <div class="lane-card" id="lane-A">
      <h3>Lane A</h3>
      <img id="img-A">
      <p class="count">0</p>
      <p id="density-A">Low</p>
      <p id="signal-A">🔴</p>
    </div>

    <div class="lane-card" id="lane-B">
      <h3>Lane B</h3>
      <img id="img-B">
      <p class="count">0</p>
      <p id="density-B">Low</p>
      <p id="signal-B">🔴</p>
    </div>

    <div class="lane-card" id="lane-C">
      <h3>Lane C</h3>
      <img id="img-C">
      <p class="count">0</p>
      <p id="density-C">Low</p>
      <p id="signal-C">🔴</p>
    </div>

  </div>

  <!-- AI + TIMER -->
  <div class="row">

    <div class="card">
      <h2>AI Decision</h2>
      <p>Lane: <span id="ai-lane">—</span></p>
      <p>Reason: <span id="ai-reason">Waiting...</span></p>
    </div>

    <div class="card center">
      <h2>Countdown</h2>
      <div class="circle">
        <svg viewBox="0 0 36 36">
          <path class="bg" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/>
          <path id="circle-progress" class="progress" d="M18 2a16 16 0 1 1 0 32a16 16 0 1 1 0-32"/>
        </svg>
        <span id="timer">10</span>
      </div>
    </div>

  </div>

  <!-- AI EXPLANATION -->
  <div class="card">
    <h2>AI Analysis</h2>
    <div id="ai-details"></div>
  </div>

  <!-- GRAPH -->
  <div class="card">
    <h2>Traffic Density</h2>
    <canvas id="densityChart"></canvas>
  </div>

  <!-- RIGHT PANEL -->
  <div class="row">

    <div class="card">
      <h2>Emergency</h2>
      <div id="emergency-status">No Ambulance</div>
    </div>

    <div class="card">
      <h2>Notifications</h2>
      <ul id="notifications"></ul>
    </div>

    <div class="card">
      <h2>History</h2>
      <table>
        <tbody id="history"></tbody>
      </table>
    </div>

  </div>

</div>

<audio id="siren-audio" src="https://www.soundjay.com/misc/sounds/siren.wav"></audio>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</body>
</html>
