{% extends "base.html" %}

{% block content %}

<!-- ================= TOP TITLE ================= -->

<div class="topbar">

  <h1>MargDrishti AI</h1>

</div>


<!-- ================= LANES ================= -->

<div class="lane-grid">

  <!-- ========================================= -->
  <!-- LANE A -->
  <!-- ========================================= -->

  <div class="lane-card" id="lane-A">

    <!-- TITLE -->
    <h3 class="lane-title">
      Lane A
    </h3>

    <!-- IMAGE -->
    <img id="img-A" src="">

    <!-- INFO -->
    <div class="lane-info">

      <!-- VEHICLE COUNT -->
      <p class="count">
        0 vehicles
      </p>

      <!-- DENSITY -->
      <p id="density-A">
        Low
      </p>

      <!-- SIGNAL -->
      <div class="traffic-signal horizontal-signal">

        <div class="light red active" id="red-A">
        </div>

        <div class="light yellow" id="yellow-A">
        </div>

        <div class="light green" id="green-A">
        </div>

      </div>

    </div>

  </div>


  <!-- ========================================= -->
  <!-- LANE B -->
  <!-- ========================================= -->

  <div class="lane-card" id="lane-B">

    <!-- TITLE -->
    <h3 class="lane-title">
      Lane B
    </h3>

    <!-- IMAGE -->
    <img id="img-B" src="">

    <!-- INFO -->
    <div class="lane-info">

      <!-- VEHICLE COUNT -->
      <p class="count">
        0 vehicles
      </p>

      <!-- DENSITY -->
      <p id="density-B">
        Low
      </p>

      <!-- SIGNAL -->
      <div class="traffic-signal horizontal-signal">

        <div class="light red active" id="red-B">
        </div>

        <div class="light yellow" id="yellow-B">
        </div>

        <div class="light green" id="green-B">
        </div>

      </div>

    </div>

  </div>


  <!-- ========================================= -->
  <!-- LANE C -->
  <!-- ========================================= -->

  <div class="lane-card" id="lane-C">

    <!-- TITLE -->
    <h3 class="lane-title">
      Lane C
    </h3>

    <!-- IMAGE -->
    <img id="img-C" src="">

    <!-- INFO -->
    <div class="lane-info">

      <!-- VEHICLE COUNT -->
      <p class="count">
        0 vehicles
      </p>

      <!-- DENSITY -->
      <p id="density-C">
        Low
      </p>

      <!-- SIGNAL -->
      <div class="traffic-signal horizontal-signal">

        <div class="light red active" id="red-C">
        </div>

        <div class="light yellow" id="yellow-C">
        </div>

        <div class="light green" id="green-C">
        </div>

      </div>

    </div>

  </div>

</div>


<!-- ================= BUTTONS ================= -->

<div class="start-section">

  <!-- START -->
  <button onclick="sendImages()">

    🚦 Start System

  </button>

  <!-- REFRESH -->
  <button class="refresh-btn" onclick="manualRefresh()">

    🔄 Refresh Scenario

  </button>

</div>


<!-- ================= BOTTOM GRID ================= -->

<div class="bottom-grid">

  <!-- AI DECISION -->
  <div class="card">

    <h3>🧠 AI Decision</h3>

    <p>

      Lane:
      <span id="ai-lane">—</span>

    </p>

    <p>

      Reason:
      <span id="ai-reason">

        Waiting...

      </span>

    </p>

  </div>


  <!-- TIMER -->
  <div class="card center">

    <h3>🚦 Signal Timer</h3>

    <div class="digital-timer">

      <span id="timer">
        10
      </span>

    </div>

  </div>


  <!-- GRAPH -->
  <div class="card">

    <h3>📊 Traffic Density</h3>

    <canvas id="densityChart"></canvas>

  </div>

</div>


<!-- ================= EMERGENCY ================= -->

<div class="card emergency">

  <h3>🚨 Emergency</h3>

  <div id="emergency-status">

    No Ambulance

  </div>

</div>


<!-- ================= LOGS ================= -->

<div class="card">

  <h3>📜 Logs</h3>

  <ul id="notifications"></ul>

</div>


<!-- ================= AUDIO ================= -->

<audio id="siren-audio" src="/static/audio/siren.wav">
</audio>


<!-- ================= JS ================= -->

<script src="/static/js/dashboard.js"></script>

{% endblock %}
